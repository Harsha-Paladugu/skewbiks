<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pyraminx.net — V-First trainer</title>
<meta name="description" content="Drill V-first Pyraminx cases: smart scrambles, a timer, recap mode and your own algorithm sheet.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Instrument+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,2 30,28 2,28' fill='%23f2cf3c'/%3E%3Cpolygon points='16,2 23,15 9,15' fill='%233fbf52'/%3E%3Cpolygon points='9,15 16,28 2,28' fill='%23e8473d'/%3E%3Cpolygon points='23,15 30,28 16,28' fill='%233a7fe8'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/site.css?v=4">
<link rel="stylesheet" href="css/trainer.css?v=9">
</head>
<body>
<!-- Shared account layer (site-wide sign in), then the navbar (which auto-mounts
     the sign-in control). -->
<script src="js/config.js?v=5"></script>
<script src="js/account.js?v=5"></script>
<script src="js/navbar.js?v=5"></script>
<script>new SiteNavbar({ active: 'trainer' }).mount(document.body);</script>
<div id="root"></div>
<!-- Shared puzzle renderer (same code the rest of the site uses for diagrams). -->
<script src="js/engine.js?v=4"></script>
<script src="js/render.js?v=4"></script>
<script>
/* Trainer storage bridge.
   The bundled trainer reads/writes its whole state through window.storage
   (an async {get,set} interface). We provide a cloud-backed one: when the
   visitor is signed in, their progress lives in the account (cloud wins on
   sign-in); otherwise it stays in localStorage, exactly as before. We hold off
   loading the bundle until the auth state is known, so the trainer's first read
   hits the right store. */
(function () {
  var A = window.OOAccount;
  var signedIn = function () { return !!(A && A.user); };

  // Coalesce rapid cloud writes; flush before the page goes away.
  var pending = null, timer = null;
  function flush() {
    if (pending === null || !signedIn()) { pending = null; return; }
    var v = pending; pending = null;
    A.saveUserDoc('trainer', v).catch(function (e) { console.error('Trainer save failed:', e); });
  }
  window.addEventListener('pagehide', flush);
  document.addEventListener('visibilitychange', function () { if (document.visibilityState === 'hidden') flush(); });

  window.storage = {
    get: async function (key) {
      if (signedIn()) {
        var v = await A.loadUserDoc('trainer');   // stored string, or null for a fresh account
        return v == null ? null : { key: key, value: v };
      }
      var lv = localStorage.getItem(key);
      return lv == null ? null : { key: key, value: lv };
    },
    set: async function (key, value) {
      if (signedIn()) { pending = value; clearTimeout(timer); timer = setTimeout(flush, 800); }
      else { try { localStorage.setItem(key, value); } catch (e) {} }
      return { key: key, value: value };
    }
  };

  // Boot the bundle once, after auth resolves; reload if the session changes
  // so the trainer re-reads from the now-correct store.
  var booted = false, bootUid = null;
  function curUid() { return signedIn() ? A.user.uid : null; }
  function boot() {
    if (booted) return; booted = true; bootUid = curUid();
    var s = document.createElement('script');
    s.src = 'js/trainer.js?v=11';
    document.body.appendChild(s);
  }
  if (A && A.whenReady) {
    A.whenReady().then(boot);
    A.onChange(function () { if (booted && curUid() !== bootUid) location.reload(); });
  } else {
    boot(); // no account layer present — behaves like the original localStorage trainer
  }
})();
</script>
</body>
</html>
